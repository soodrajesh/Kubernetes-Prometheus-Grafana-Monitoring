apiVersion: v2
name: monitoring-stack
description: A comprehensive Kubernetes monitoring stack with Prometheus, Grafana, and AlertManager
type: application
version: 1.0.0
appVersion: "1.0.0"
kubeVersion: ">=1.20.0-0"

maintainers:
  - name: Raj Sood
    email: soodrajesh87@gmail.com
    url: https://github.com/soodrajesh

keywords:
  - monitoring
  - prometheus
  - grafana
  - alertmanager
  - kubernetes
  - observability

home: https://github.com/soodrajesh/Kubernetes-Prometheus-Grafana-Monitoring
sources:
  - https://github.com/soodrajesh/Kubernetes-Prometheus-Grafana-Monitoring

dependencies:
  - name: prometheus
    version: "25.8.0"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled
  - name: grafana
    version: "7.0.19"
    repository: "https://grafana.github.io/helm-charts"
    condition: grafana.enabled
  - name: alertmanager
    version: "1.7.0"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: alertmanager.enabled

annotations:
  category: Monitoring
  licenses: MIT
